<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人介绍 - 游戏社交名片">
    <title>尘易飞 - 个人介绍</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- 动态背景层 -->
    <div class="bg-overlay">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <canvas class="bg-particles" id="particleCanvas"></canvas>
    </div>

    <!-- 主内容容器 -->
    <div class="container">

        <!-- 头像区域 -->
        <header class="profile-header animate-on-load">
            <div class="avatar-wrapper">
                <div class="avatar">
                    <img src="images/avatar.jpg" alt="头像" />
                </div>
            </div>
            <h1 class="nickname" data-i18n="nickname">尘易飞</h1>
            <p class="player-id" data-i18n="subtitle">轻尘亦可飞扬</p>

            <!-- 语言切换器 -->
            <div class="lang-switcher" id="langSwitcher">
                <button class="lang-btn" id="langBtn" type="button">
                    <svg class="lang-globe" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93C7.05 19.44 4 16.08 4 12c0-.61.08-1.21.21-1.78L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41C17.93 5.78 20 8.65 20 12c0 2.08-.81 3.98-2.1 5.39z" />
                    </svg>
                    <span class="lang-current" id="langCurrent">简体中文</span>
                    <svg class="lang-arrow" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M7 10l5 5 5-5z" />
                    </svg>
                </button>
                <ul class="lang-menu" id="langMenu">
                    <li data-lang="zh" class="active">简体中文</li>
                    <li data-lang="en">English</li>
                    <li data-lang="ja">日本語</li>
                    <li data-lang="ko">한국어</li>
                </ul>
            </div>
        </header>

        <!-- 自我介绍区域 -->
        <main class="content">
            <section class="intro-card reveal-on-scroll">
                <h2 class="section-title" data-i18n="about">关于我</h2>
                <p class="intro-text" data-i18n-html="intro">
                    我是一个计算机专业的大学生——虽然对计算机其实一窍不通来着。<br />
                    不习惯开麦，我主要一个人玩Minecraft、RimWorld、VRChat等游戏。<br />
                    想学习blender，Godot，但是是个懒癌患者，只学了个开头，其实可以说是从未开始。<br />
                    做事情总是半途而废，即使是自己的兴趣。
                </p>
            </section>

            <!-- 喜欢的游戏 -->
            <section class="tags-section reveal-on-scroll">
                <h2 class="section-title" data-i18n="favGames">喜欢的游戏</h2>
                <div class="tags">
                    <span class="tag">Minecraft</span>
                    <span class="tag">RimWorld</span>
                    <span class="tag">VRChat</span>
                </div>
            </section>

            <!-- 社交链接区域 -->
            <section class="social-section reveal-on-scroll">
                <h2 class="section-title" data-i18n="contact">联系我</h2>
                <div class="social-links">
                    <a href="tencent://message/?uin=3261547169" class="social-btn qq" title="QQ: 3261547169"
                        data-info="QQ号：3261547169" data-desc="点击确定将尝试打开 QQ 对话窗口">
                        <svg viewBox="0 0 24 24" class="social-icon">
                            <path fill="currentColor"

                        </svg>
                        <span>QQ</span>
                    </a>

                        data-info="邮箱地址：3261547169@qq.com" data-desc="点击确定将打开邮件客户端">
                        <svg viewBox="0 0 24 24" class="social-icon">
                            <path fill="currentColor"
                                d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />

                        title="Steam 个人主页" target="_blank" rel="noopener" data-info="即将跳转到 Steam 个人主页"
                        data-desc="steamcommunity.com/profiles/76561199515925903">
                        <svg viewBox="0 0 24 24" class="social-icon">
                            <path fill="currentColor"
                                d="M11.979 0C5.362 0 0 5.362 0 11.979 0 18.595 5.362 24 11.979 24 18.595 24 24 18.596 24 11.979 24 5.362 18.596 0 11.979 0zm0 1.425c5.835 0 10.554 4.719 10.554 10.554a10.527 10.527 0 0 1-4.175 8.338l-2.265-3.278a4.14 4.14 0 0 0 .693-2.285 4.157 4.157 0 0 0-8.157-.39l-3.581 1.46A10.521 10.521 0 0 1 11.979 1.425zm3.764 5.733a2.694 2.694 0 0 0-1.424.398l-4.987 2.924c-.177-.042-.361-.065-.548-.065a2.846 2.846 0 0 0-.722.093l3.595-1.466a.53.53 0 0 1 .652.652l-1.466 3.595a2.843 2.843 0 0 0 2.731 2.053c.169 0 .334-.015.495-.043l2.934 4.252a10.35 10.35 0 0 1-3.718.682c-5.742 0-10.411-4.669-10.411-10.411 0-1.442.296-2.817.83-4.072l3.863-.793a4.143 4.143 0 0 0 3.705 2.907 4.14 4.14 0 0 0 3.609-2.158.537.537 0 0 0-.181-.735zm-6.621 5.668c.818 0 1.48.662 1.48 1.48a1.48 1.48 0 0 1-1.48 1.479 1.48 1.48 0 0 1-1.479-1.479c0-.818.662-1.48 1.48-1.48z" />
                        </svg>
                        <span>Steam</span>
                    </a>
                    <a href="#" class="social-btn discord" title="守法公民不翻墙" data-info="守法公民不翻墙" data-desc="">
                        <svg viewBox="0 0 24 24" class="social-icon">
                            <path fill="currentColor"
                                d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />
                        </svg>
                        <span>Discord</span>
                    </a>
                </div>
            </section>
        </main>

        <!-- 页脚 -->
        <footer class="page-footer reveal-on-scroll">
            <p data-i18n="footer">别人晨练我晨睡，别人学习我拱被</p>
        </footer>

        <!-- 彩蛋：仅在简体中文模式下显示 -->
        <div class="easter-egg reveal-on-scroll" id="easterEgg">
            <div class="easter-img-wrapper">
                <img src="images/image.png" alt="翻墙了是吧" class="easter-img" />
            </div>
            <p class="easter-caption">能访问到这里，翻墙了是吧</p>
        </div>

    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <p class="modal-info" id="modalInfo"></p>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel" data-i18n="cancel">取消</button>
                <button class="modal-btn confirm" id="modalConfirm" data-i18n="confirm">确定</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人介绍 - 游戏社交名片">
    <title>尘易飞 - 个人介绍</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- 动态背景层 -->
    <div class="bg-overlay">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <canvas class="bg-particles" id="particleCanvas"></canvas>
    </div>

    <!-- 主内容容器 -->
    <div class="container">

        <!-- 头像区域 -->
        <header class="profile-header animate-on-load">
            <div class="avatar-wrapper">
                <div class="avatar">
                    <img src="images/avatar.jpg" alt="头像" referrerpolicy="no-referrer"
                        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22260%22 height=%22260%22><rect fill=%22%231a1a2e%22 width=%22260%22 height=%22260%22/><text fill=%22%23555%22 x=%22130%22 y=%22130%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2216%22>头像</text></svg>'" />
                </div>
            </div>
            <h1 class="nickname" data-i18n="nickname">尘易飞</h1>
            <p class="player-id" data-i18n="subtitle">轻尘亦可飞扬</p>

            <!-- 语言切换器 -->
            <div class="lang-switcher" id="langSwitcher">
                <button class="lang-btn" id="langBtn" type="button">
                    <svg class="lang-globe" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93C7.05 19.44 4 16.08 4 12c0-.61.08-1.21.21-1.78L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41C17.93 5.78 20 8.65 20 12c0 2.08-.81 3.98-2.1 5.39z" />
                    </svg>
                    <span class="lang-current" id="langCurrent">简体中文</span>
                    <svg class="lang-arrow" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M7 10l5 5 5-5z" />
                    </svg>
                </button>
                <ul class="lang-menu" id="langMenu">
                    <li data-lang="zh" class="active">简体中文</li>
                    <li data-lang="en">English</li>
                    <li data-lang="ja">日本語</li>
                    <li data-lang="ko">한국어</li>
                </ul>
            </div>
        </header>

        <!-- 自我介绍区域 -->
        <main class="content">
            <section class="intro-card reveal-on-scroll">
                <h2 class="section-title" data-i18n="about">关于我</h2>
                <p class="intro-text" data-i18n-html="intro">
                    我是一个计算机专业的大学生——虽然对计算机其实一窍不通来着。<br />
                    不习惯开麦，我主要一个人玩Minecraft、RimWorld、VRChat等游戏。<br />
                    想学习blender，Godot，但是是个懒癌患者，只学了个开头，其实可以说是从未开始。<br />
                    做事情总是半途而废，即使是自己的兴趣。
                </p>
            </section>

            <!-- 喜欢的游戏 -->
            <section class="tags-section reveal-on-scroll">
                <h2 class="section-title" data-i18n="favGames">喜欢的游戏</h2>
                <div class="tags">
                    <span class="tag">
                        <img src="https://cdn.simpleicons.org/minecraft/00d4ff" alt="" class="tag-icon" />
                        Minecraft
                    </span>
                    <span class="tag">
                        <img src="images/RimWorld.ico" alt="" class="tag-icon" />
                        RimWorld
                    </span>
                    <span class="tag">
                        <img src="images/VRChat.ico" alt="" class="tag-icon" />
                        VRChat
                    </span>
                    <span class="tag">
                        <img src="images/Valorant.ico" alt="" class="tag-icon" onerror="this.style.display='none'" />
                        无畏契约
                    </span>
                </div>
            </section>

            <!-- 社交链接区域 -->
            <section class="social-section reveal-on-scroll">
                <h2 class="section-title" data-i18n="contact">联系我</h2>
                <div class="social-links">
                    <a href="tencent://message/?uin=3261547169" class="social-btn qq" title="QQ: 3261547169"
                        data-info="QQ号：3261547169" data-desc="点击确定将尝试打开 QQ 对话窗口">
                        <img src="https://cdn.simpleicons.org/tencentqq/white" alt="QQ" class="social-icon" />
                        <span>QQ</span>
                    </a>
                    <a href="mailto:3261547169@qq.com" class="social-btn email" title="邮箱: 3261547169@qq.com"
                        data-info="邮箱地址：3261547169@qq.com" data-desc="点击确定将打开邮件客户端">
                        <svg viewBox="0 0 24 24" class="social-icon">
                            <path fill="currentColor"
                                d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                        </svg>
                        <span>邮箱</span>
                    </a>
                    <a href="https://steamcommunity.com/profiles/76561199515925903/" class="social-btn steam"
                        title="Steam 个人主页" target="_blank" rel="noopener" data-info="即将跳转到 Steam 个人主页"
                        data-desc="steamcommunity.com/profiles/76561199515925903">
                        <img src="images/Steam.ico" alt="Steam" class="social-icon" />
                        <span>Steam</span>
                    </a>
                </div>
            </section>
        </main>

        <!-- 页脚 -->
        <footer class="page-footer reveal-on-scroll">
            <p data-i18n="footer">别人晨练我晨睡，别人学习我拱被</p>
        </footer>

    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <p class="modal-info" id="modalInfo"></p>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel" data-i18n="cancel">取消</button>
                <button class="modal-btn confirm" id="modalConfirm" data-i18n="confirm">确定</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
